name: Morning Tech Digest

on:
  schedule:
    # Runs every day at 07:00 UTC — adjust to your timezone
    # UTC+1 (CET)  → use 06:00 UTC
    # UTC+2 (EET)  → use 05:00 UTC
    # UTC-5 (EST)  → use 12:00 UTC
    - cron: "0 7 * * *"

  # Allows you to trigger manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node agent.js
